version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: wp_autoflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  mongo:
    image: mongo:latest
    container_name: wp_autoflow_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

volumes:
  redis_data_dev:
  mongo_data_dev: